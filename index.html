<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BlingBling Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: white; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }
        
        header { 
            background: #000; padding: 5px; text-align: center; 
            border-bottom: 1px solid #333; height: 60px; 
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        header img { height: 40px; }

        .main-container { display: flex; flex-direction: column; flex-grow: 1; height: calc(100% - 60px); }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: #111; }

        #sidebar { 
            background: #000; border-top: 1px solid #333; 
            padding: 15px; height: 130px; flex-shrink: 0; overflow-y: auto;
        }

        @media (min-width: 769px) {
            .main-container { flex-direction: row; }
            #sidebar { width: 320px; height: 100%; border-top: none; border-right: 1px solid #333; }
        }

        h2 { font-size: 11px; color: #888; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .driver-item { padding: 10px 0; border-bottom: 1px solid #111; color: #fff; font-weight: 600; font-size: 15px; display: flex; align-items: center; }
        .driver-item::before { content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px #00ff00; }
        
        /* De moderne labels boven de auto's */
        .driver-label { 
            background: rgba(255, 204, 0, 0.95); color: #000; font-weight: 800; 
            padding: 4px 10px; border-radius: 6px; border: 2px solid #fff; 
            font-size: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .status-dot { 
            position: absolute; top: 75px; left: 15px; padding: 6px 12px; 
            border-radius: 6px; font-weight: bold; z-index: 1000; font-size: 10px;
            background: #222; color: #fff; border: 1px solid #333;
        }
        .online { border-color: #00ff00; color: #00ff00; }

        .map-toggle {
            position: absolute; top: 75px; right: 15px; z-index: 1000;
            background: #fff; color: #000; border: none; padding: 10px 15px;
            border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header><img src="logo.png" onerror="this.src='https://via.placeholder.com/150x50?text=BlingBling'"></header>
    
    <div class="main-container">
        <div id="map"></div>
        <button class="map-toggle" onclick="toggleMap()">STYLE: DARK</button>
        <div id="sidebar">
            <h2>Actieve Bezorgers</h2>
            <ul id="driver-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>
    
    <div id="status-box" class="status-dot">CONNECTING...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const statusBox = document.getElementById('status-box');
        const mapBtn = document.querySelector('.map-toggle');
        
        // Moderne CartoDB Tiles (Veel strakker en actueler)
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' });
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' });

        const map = L.map('map', { zoomControl: false, wheelDebounceTime: 150 }).setView([52.247, 5.378], 14);
        darkLayer.addTo(map);

        let isDark = true;
        function toggleMap() {
            if (isDark) {
                map.removeLayer(darkLayer);
                lightLayer.addTo(map);
                mapBtn.innerText = "STYLE: LIGHT";
                mapBtn.style.background = "#000";
                mapBtn.style.color = "#fff";
                isDark = false;
            } else {
                map.removeLayer(lightLayer);
                darkLayer.addTo(map);
                mapBtn.innerText = "STYLE: DARK";
                mapBtn.style.background = "#fff";
                mapBtn.style.color = "#000";
                isDark = true;
            }
        }

        const carIcon = L.divIcon({
            className: 'car-marker',
            html: '<div style="font-size: 28px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));">🚗</div>',
            iconSize: [35, 35],
            iconAnchor: [17, 17]
        });

        const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
        const channel = ably.channels.get('tracking');

        ably.connection.on('connected', () => {
            statusBox.innerText = "● SYSTEM LIVE";
            statusBox.className = "status-dot online";
        });

        let markers = {};

        channel.subscribe('pos', (message) => {
            const { name, lat, lng } = message.data;
            const pos = [lat, lng];

            if (!markers[name]) {
                const li = document.createElement('li');
                li.className = "driver-item";
                li.innerText = name;
                document.getElementById('driver-list').appendChild(li);

                markers[name] = L.marker(pos, { icon: carIcon }).addTo(map)
                    .bindTooltip(name, { permanent: true, direction: 'top', className: 'driver-label', offset: [0, -15], opacity: 1 })
                    .openTooltip();
                
                map.flyTo(pos, 15, { animate: true, duration: 2 });
            } else {
                // Vloeiende beweging naar nieuwe positie
                markers[name].setLatLng(pos);
            }
        });
    </script>
</body>
</html>
