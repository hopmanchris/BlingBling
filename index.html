<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BlingBling Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column;
        }
        header { background: #000; padding: 5px; text-align: center; border-bottom: 2px solid #ffcc00; height: 60px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        header img { height: 45px; }
        .main-container { display: flex; flex-direction: column; flex-grow: 1; height: calc(100% - 60px); position: relative; }
        #map { flex-grow: 1; width: 100%; z-index: 1; background: #111; }
        #sidebar { background: #1a2a3a; border-top: 1px solid #334455; padding: 15px; height: 150px; flex-shrink: 0; overflow-y: auto; }
        @media (min-width: 769px) { .main-container { flex-direction: row; } #sidebar { width: 350px; height: 100%; border-top: none; border-right: 1px solid #334455; } }
        h2 { font-size: 12px; color: #ffcc00; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .driver-item { padding: 10px 0; border-bottom: 1px solid #2a3a4a; display: flex; justify-content: space-between; align-items: center; }
        .driver-info { color: #00ff00; font-weight: bold; font-size: 15px; }
        .driver-eta { color: #ffcc00; font-size: 12px; text-align: right; font-weight: 600; }
        .driver-label { background: #ffcc00; color: #000; font-weight: 800; padding: 2px 8px; border-radius: 4px; border: 1px solid #000; font-size: 11px; text-transform: uppercase; }
        .status-dot { position: absolute; bottom: 165px; left: 15px; padding: 5px 12px; border-radius: 20px; font-weight: bold; z-index: 1000; font-size: 10px; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #333; }
        .online { border-color: #00ff00; color: #00ff00; }
        .map-toggle { position: absolute; top: 15px; right: 15px; z-index: 1000; background: #ffcc00; color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <header><img src="logo.png" onerror="this.src='https://via.placeholder.com/150x50?text=BlingBling'"></header>
    <div class="main-container">
        <div id="map"></div>
        <button class="map-toggle" onclick="toggleMap()">WISSEL KAART</button>
        <div id="status-box" class="status-dot">VERBINDEN...</div>
        <div id="sidebar">
            <h2>Bezorgers</h2>
            <ul id="driver-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const hqPos = [52.22419, 5.37145]; // Het Steenland 4
        const statusBox = document.getElementById('status-box');
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; Carto' });
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; Carto' });

        const map = L.map('map', { zoomControl: false }).setView(hqPos, 14);
        darkLayer.addTo(map);

        // HQ Marker
        L.marker(hqPos, {
            icon: L.divIcon({
                className: 'hq-marker',
                html: '<div style="font-size: 30px; filter: drop-shadow(0 0 5px gold);">🏠</div>',
                iconSize: [40, 40], iconAnchor: [20, 20]
            })
        }).addTo(map).bindTooltip("BlingBling HQ", { permanent: true, direction: 'bottom' });

        let isDark = true;
        function toggleMap() {
            if (isDark) { map.removeLayer(darkLayer); lightLayer.addTo(map); isDark = false; }
            else { map.removeLayer(lightLayer); darkLayer.addTo(map); isDark = true; }
        }

        const carIcon = L.divIcon({
            className: 'car-marker',
            html: '<div style="font-size: 26px; filter: drop-shadow(0 0 2px black);">🚗</div>',
            iconSize: [30, 30], iconAnchor: [15, 15]
        });

        const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
        const channel = ably.channels.get('tracking');

        ably.connection.on('connected', () => {
            statusBox.innerText = "● SYSTEM LIVE";
            statusBox.className = "status-dot online";
        });

        let markers = {};

        // Hulpmiddel om afstand te berekenen
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        channel.subscribe('pos', (message) => {
            const { name, lat, lng } = message.data;
            const dist = calculateDistance(lat, lng, hqPos[0], hqPos[1]);
            const mins = Math.round(dist * 2); // Gemiddelde inschatting (30km/u in dorp)

            if (!markers[name]) {
                const li = document.createElement('li');
                li.id = "li-" + name;
                li.className = "driver-item";
                li.innerHTML = `<div class="driver-info">🚗 ${name}</div><div id="eta-${name}" class="driver-eta">${dist.toFixed(1)} km<br>${mins} min</div>`;
                document.getElementById('driver-list').appendChild(li);

                markers[name] = L.marker([lat, lng], { icon: carIcon }).addTo(map)
                    .bindTooltip(name, { permanent: true, direction: 'top', className: 'driver-label', offset: [0, -10] }).openTooltip();
            } else {
                markers[name].setLatLng([lat, lng]);
                document.getElementById(`eta-${name}`).innerHTML = `${dist.toFixed(1)} km<br>${mins} min`;
            }
        });
    </script>
</body>
</html>
