<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling | Live Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --gold: #ffcc00; --bg: #000; }

        /* iPhone Fix: Voorkom scrollen en forceer full-screen */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background: var(--bg); 
            font-family: -apple-system, sans-serif;
            overflow: hidden; 
            position: fixed; 
        }

        /* HEADER IDENTIEK AAN PLANNING */
        header { 
            background: #000; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold); 
            height: 110px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000;
            position: relative;
        }
        header img { height: 85px; filter: drop-shadow(0 0 8px rgba(255,204,0,0.5)); }

        /* KAART CONTAINER FIX VOOR IOS */
        #map { 
            position: absolute;
            top: 110px; /* Precies onder de header */
            bottom: 0;
            width: 100%;
            background: #111; /* Tijdelijke kleur tijdens laden */
        }

        /* Marker Styling */
        .custom-marker {
            background: var(--gold);
            border: 2px solid #fff;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            color: #000;
            line-height: 30px;
            box-shadow: 0 0 10px rgba(255,204,0,0.8);
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" onerror="this.src='https://hopmanchris.github.io/BlingBling/logo.png'">
</header>

<div id="map"></div>

<script>
    // 1. Initialiseer de kaart
    // We zetten de zoom iets hoger voor mobiel overzicht
    var map = L.map('map', {
        zoomControl: false // Verplaatsen we naar rechts voor duimen
    }).setView([52.24, 5.37], 13); 

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. Donkere kaart stijl (Past bij BlingBling)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 3. Ably Verbinding
    const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
    const channel = ably.channels.get('tracking');
    const markers = {};

    // 4. Luister naar locaties
    channel.subscribe('pos', (msg) => {
        const { id, name, lat, lon } = msg.data;

        if (markers[id]) {
            // Update bestaande marker
            markers[id].setLatLng([lat, lon]);
        } else {
            // Maak nieuwe marker met de eerste letter van de naam
            const icon = L.divIcon({
                className: 'custom-marker',
                html: name.charAt(0).toUpperCase(),
                iconSize: [30, 30]
            });
            markers[id] = L.marker([lat, lon], { icon: icon }).addTo(map)
                .bindPopup('<b>' + name + '</b>');
        }
    });

    // iPhone Fix: Forceer kaart-update na 500ms
    setTimeout(() => {
        map.invalidateSize();
    }, 500);
</script>

</body>
</html>
