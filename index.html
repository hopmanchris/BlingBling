<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>BlingBling Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; }
        #top-bar { background: #000; padding: 10px; text-align: center; border-bottom: 2px solid #ffcc00; }
        .main { display: flex; flex: 1; }
        #sidebar { width: 250px; background: #000; padding: 20px; border-right: 1px solid #333; }
        #map { flex: 1; }
        #status-indicator { background: red; color: white; padding: 5px; font-size: 10px; position: absolute; bottom: 10px; left: 10px; z-index: 9999; }
    </style>
</head>
<body>
    <div id="top-bar"><img src="logo.png" height="40"></div>
    <div class="main">
        <div id="sidebar">
            <h3 style="color: #ffcc00">LIVE BEZORGERS</h3>
            <ul id="list" style="list-style: none; padding: 0;"></ul>
            <div id="debug-log" style="font-size: 10px; color: #666; margin-top: 20px;">Systeem start op...</div>
        </div>
        <div id="map"></div>
    </div>
    <div id="status-indicator">ABLY: DISCONNECTED</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const log = document.getElementById('debug-log');
        const statusInd = document.getElementById('status-indicator');
        
        // 1. Setup Kaart
        const map = L.map('map').setView([52.247, 5.378], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. Setup Ably
        const ably = new Ably.Realtime('IZkpmw.mB2_5w:PAn16Xo-N-E-P2P3pXitR8Cizp2C76IqD5A_p8_qF2w');
        const channel = ably.channels.get('tracking');

        ably.connection.on('connected', () => {
            statusInd.innerText = "ABLY: CONNECTED";
            statusInd.style.background = "green";
            log.innerText = "Verbonden! Wachten op mobiel signaal...";
        });

        let markers = {};

        channel.subscribe('pos', (msg) => {
            log.innerText = "LAATSTE SIGNAAL: " + new Date().toLocaleTimeString();
            const { name, lat, lng } = msg.data;
            
            if (!markers[name]) {
                const li = document.createElement('li');
                li.innerText = "🚚 " + name;
                li.style.padding = "10px 0";
                li.style.borderBottom = "1px solid #222";
                document.getElementById('list').appendChild(li);
                
                markers[name] = L.marker([lat, lng]).addTo(map).bindTooltip(name, {permanent: true}).openTooltip();
                map.panTo([lat, lng]);
            } else {
                markers[name].setLatLng([lat, lng]);
            }
        });
    </script>
</body>
</html>
