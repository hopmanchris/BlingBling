<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingBling | Live Operations</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0e14; --card: rgba(255, 255, 255, 0.05); --text: #ffffff; }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        header { 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            padding: 10px; text-align: center; border-bottom: 1px solid var(--gold); 
            height: 65px; display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        header img { height: 45px; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .main-container { display: flex; flex-direction: column; height: calc(100% - 65px); }
        @media (min-width: 900px) { .main-container { flex-direction: row; } }

        #map { flex-grow: 1; z-index: 1; }
        
        #sidebar { 
            width: 100%; max-height: 250px; background: rgba(13, 20, 30, 0.95); 
            backdrop-filter: blur(15px); border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column; z-index: 1000;
        }
        @media (min-width: 900px) { #sidebar { width: 380px; max-height: 100%; } }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 0.8rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 3px; }

        /* Driver Card Styling */
        #driver-list { flex-grow: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .driver-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .driver-top { display: flex; justify-content: space-between; align-items: center; }
        .driver-name { font-weight: bold; font-size: 1.1rem; color: #00ff00; }
        .driver-stats { text-align: right; font-size: 0.85rem; color: var(--gold); }

        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-bar { background: var(--gold); height: 100%; width: 0%; box-shadow: 0 0 10px var(--gold); }

        /* HQ & Car Markers */
        .hq-glow { animation: hq-pulse 2s infinite; }
        @keyframes hq-pulse { 
            0% { filter: drop-shadow(0 0 2px gold); } 
            50% { filter: drop-shadow(0 0 12px gold); } 
            100% { filter: drop-shadow(0 0 2px gold); } 
        }

        .map-btn { 
            background: var(--gold); color: black; border: none; padding: 8px 15px; 
            border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 10px; 
            text-transform: uppercase; box-shadow: 0 4px 10px rgba(255,204,0,0.3);
        }

        .system-badge {
            margin-top: auto; padding: 10px; text-align: center; border-radius: 8px;
            font-size: 10px; font-weight: bold; border: 1px solid #00ff00; color: #00ff00;
            background: rgba(0,255,0,0.05); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header><img src="logo.png" onerror="this.src='https://via.placeholder.com/150x50?text=BlingBling'"></header>
    
    <div class="main-container">
        <div id="map"></div>
        
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>Live Fleet</h2>
                <button class="map-btn" onclick="toggleMap()">Sfeer Wisselen</button>
            </div>
            
            <ul id="driver-list">
                </ul>
            
            <div class="system-badge">● Satellite Connection Active</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const hqPos = [52.22419, 5.37145];
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');

        const map = L.map('map', { zoomControl: false }).setView(hqPos, 14);
        darkLayer.addTo(map);

        // HQ Marker met animatie
        L.marker(hqPos, {
            icon: L.divIcon({
                className: 'hq-marker',
                html: '<div class="hq-glow" style="font-size: 30px;">🏠</div>',
                iconSize: [30, 30], iconAnchor: [15, 15]
            })
        }).addTo(map);

        let isDark = true;
        function toggleMap() {
            if (isDark) { map.removeLayer(darkLayer); lightLayer.addTo(map); isDark = false; }
            else { map.removeLayer(lightLayer); darkLayer.addTo(map); isDark = true; }
        }

        const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
        const channel = ably.channels.get('tracking');

        let drivers = {};

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        channel.subscribe('pos', (msg) => {
            const { name, lat, lng } = msg.data;
            const dist = getDistance(lat, lng, hqPos[0], hqPos[1]);
            const eta = Math.ceil(dist * 2.5);
            
            // Voortgang berekenen (stel max afstand is 5km voor de bar)
            const progress = Math.max(0, Math.min(100, (1 - (dist / 5)) * 100));

            if (!drivers[name]) {
                // Maak nieuwe Driver Card
                const card = document.createElement('li');
                card.id = `card-${name}`;
                card.className = "driver-card";
                card.innerHTML = `
                    <div class="driver-top">
                        <span class="driver-name">🚗 ${name}</span>
                        <span class="driver-stats" id="stats-${name}">${dist.toFixed(1)} km | ${eta} min</span>
                    </div>
                    <div class="progress-bg"><div class="progress-bar" id="bar-${name}" style="width: ${progress}%"></div></div>
                `;
                document.getElementById('driver-list').appendChild(card);

                // Voeg marker toe aan kaart
                drivers[name] = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: 'car-label',
                        html: `<div style="background:var(--gold); color:black; padding:2px 8px; border-radius:5px; font-weight:bold; font-size:12px; border:2px solid black;">${name}</div>`,
                        iconSize: [60, 20], iconAnchor: [30, 40]
                    })
                }).addTo(map);
            } else {
                // Update bestaande info
                drivers[name].setLatLng([lat, lng]);
                document.getElementById(`stats-${name}`).innerText = `${dist.toFixed(1)} km | ${eta} min`;
                document.getElementById(`bar-${name}`).style.width = `${progress}%`;
            }
        });
    </script>
</body>
</html>
