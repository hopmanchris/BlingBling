<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling | Live Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --gold: #ffcc00; --bg: #000; --sidebar-bg: #111d2b; --text: #ffffff; }

        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); font-family: -apple-system, sans-serif;
            overflow: hidden; position: fixed; 
        }

        /* HEADER */
        header { 
            background: #000; padding: 15px; text-align: center; 
            border-bottom: 2px solid var(--gold); height: 110px; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 2000; position: relative;
        }
        header img { height: 85px; filter: drop-shadow(0 0 8px rgba(255,204,0,0.5)); }

        /* MAIN LAYOUT */
        .main-wrapper {
            display: flex;
            height: calc(100vh - 110px);
            width: 100%;
            position: absolute;
            top: 110px;
        }

        /* SIDEBAR (BEZORGERS) */
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255,204,0,0.2);
            overflow-y: auto;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        
        @media (max-width: 768px) {
            #sidebar { width: 100px; } /* Smaller op mobiel */
            .bezorger-naam { display: none; } /* Alleen icoon op mobiel */
        }

        #sidebar h3 {
            color: var(--gold);
            text-align: center;
            font-size: 1rem;
            padding: 15px;
            margin: 0;
            border-bottom: 1px solid rgba(255,204,0,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bezorger-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            cursor: pointer;
        }
        .status-dot { width: 10px; height: 10px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        /* KAART */
        #map { 
            flex-grow: 1;
            background: #0b0d10;
        }

        /* MARKER STYLING */
        .custom-marker {
            background: var(--gold);
            border: 2px solid #fff;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            color: #000;
            line-height: 30px;
            box-shadow: 0 0 10px rgba(255,204,0,0.8);
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" onerror="this.src='https://hopmanchris.github.io/BlingBling/logo.png'">
</header>

<div class="main-wrapper">
    <div id="sidebar">
        <h3>Bezorgers</h3>
        <div id="bezorgers-lijst"></div>
    </div>

    <div id="map"></div>
</div>

<script>
    // Kaart instellen
    var map = L.map('map', { zoomControl: false }).setView([52.24, 5.37], 13); 
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
    const channel = ably.channels.get('tracking');
    const markers = {};

    channel.subscribe('pos', (msg) => {
        const { id, name, lat, lon } = msg.data;

        // Update of maak Marker
        if (markers[id]) {
            markers[id].setLatLng([lat, lon]);
        } else {
            const icon = L.divIcon({
                className: 'custom-marker',
                html: name.charAt(0).toUpperCase(),
                iconSize: [30, 30]
            });
            markers[id] = L.marker([lat, lon], { icon: icon }).addTo(map)
                .bindPopup('<b>' + name + '</b>');

            // Voeg toe aan zijbalk lijst
            const lijst = document.getElementById('bezorgers-lijst');
            const item = document.createElement('div');
            item.className = 'bezorger-item';
            item.innerHTML = `<div class="status-dot"></div> <span class="bezorger-naam">${name}</span>`;
            item.onclick = () => map.setView([lat, lon], 16);
            lijst.appendChild(item);
        }
    });

    // iPhone Fix: Forceer kaart-update
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>

</body>
</html>
