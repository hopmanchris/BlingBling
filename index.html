<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlingBling Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 10px; display: flex; justify-content: center; align-items: center; height: 60px; }
        header img { max-height: 50px; }
        .main-container { display: flex; flex-grow: 1; }
        #sidebar { width: 250px; background: #000; color: white; padding: 20px; border-right: 1px solid #333; }
        #sidebar h2 { font-size: 14px; color: #ffcc00; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #driver-list { list-style: none; padding: 0; }
        .driver-item { padding: 10px; border-bottom: 1px solid #222; display: flex; align-items: center; font-size: 14px; }
        .driver-item::before { content: "●"; color: #00ff00; margin-right: 10px; }
        #map { flex-grow: 1; background: #222; }
        .driver-label { background: #ffcc00; border: 1px solid #000; font-weight: bold; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <header><img src="logo.png"></header>
    <div class="main-container">
        <div id="sidebar">
            <h2>Wie zijn er aan het rijden?</h2>
            <ul id="driver-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const ably = new Ably.Realtime('IZkpmw.mB2_5w:PAn16Xo-N-E-P2P3pXitR8Cizp2C76IqD5A_p8_qF2w');
        const channel = ably.channels.get('tracking');
        
        const map = L.map('map').setView([52.247, 5.378], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let markers = {};
        let activeDrivers = new Set();

        channel.subscribe('pos', (message) => {
            const { name, lat, lng } = message.data;
            console.log("Data ontvangen voor:", name, lat, lng);

            // 1. Update de lijst links
            if (!activeDrivers.has(name)) {
                activeDrivers.add(name);
                const li = document.createElement('li');
                li.id = "list-" + name;
                li.className = "driver-item";
                li.innerText = name;
                document.getElementById('driver-list').appendChild(li);
            }

            // 2. Update de marker op de kaart
            if (markers[name]) {
                markers[name].setLatLng([lat, lng]);
            } else {
                markers[name] = L.marker([lat, lng]).addTo(map)
                    .bindTooltip(name, { permanent: true, direction: 'top', className: 'driver-label' })
                    .openTooltip();
                
                // Bij de allereerste bezorger: zoom de kaart naar hem toe
                if (Object.keys(markers).length === 1) {
                    map.setView([lat, lng], 16);
                }
            }
        });
    </script>
</body>
</html>
