<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BlingBling Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #000; padding: 5px; text-align: center; border-bottom: 2px solid #ffcc00; height: 60px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        header img { height: 40px; }
        .main-container { display: flex; flex-direction: column; flex-grow: 1; height: calc(100% - 60px); position: relative; }
        #map { flex-grow: 1; width: 100%; z-index: 1; background: #111; }
        #sidebar { background: #1a2a3a; border-top: 1px solid #334455; padding: 15px; height: 140px; flex-shrink: 0; overflow-y: auto; }
        @media (min-width: 769px) { .main-container { flex-direction: row; } #sidebar { width: 320px; height: 100%; border-top: none; border-right: 1px solid #334455; } }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h2 { font-size: 11px; color: #ffcc00; margin: 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        .driver-item { padding: 8px 0; border-bottom: 1px solid #2a3a4a; display: flex; justify-content: space-between; align-items: center; }
        .driver-info { color: #00ff00; font-weight: bold; font-size: 14px; }
        .driver-eta { color: #ffcc00; font-size: 11px; text-align: right; font-weight: 600; line-height: 1.2; }
        
        .driver-label { background: #ffcc00; color: #000; font-weight: 800; padding: 2px 6px; border-radius: 4px; border: 1px solid #000; font-size: 10px; text-transform: uppercase; }
        
        /* Subtieler HQ Label */
        .hq-label { background: rgba(0,0,0,0.8) !important; color: #ffcc00 !important; border: 1px solid #444 !important; font-weight: bold; font-size: 9px; padding: 1px 4px; border-radius: 3px; box-shadow: none !important; }
        
        /* Glowing System Live Indicator */
        .status-dot { 
            position: absolute; bottom: 155px; left: 10px; padding: 4px 10px; 
            border-radius: 4px; font-weight: 900; z-index: 1000; font-size: 9px; 
            background: rgba(0,0,0,0.85); color: #00ff00; border: 1px solid #00ff00;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(0, 255, 0, 0.4); border-color: rgba(0, 255, 0, 0.6); }
            50% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.8); border-color: rgba(0, 255, 0, 1); }
            100% { box-shadow: 0 0 5px rgba(0, 255, 0, 0.4); border-color: rgba(0, 255, 0, 0.6); }
        }
        
        .map-toggle { background: #ffcc00; color: #000; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 9px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header><img src="logo.png" onerror="this.src='https://via.placeholder.com/150x50?text=BlingBling'"></header>
    <div class="main-container">
        <div id="map"></div>
        <div id="status-box" class="status-dot">SYSTEM LIVE</div>
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>Bezorgers</h2>
                <button class="map-toggle" onclick="toggleMap()">Wissel Kaart</button>
            </div>
            <ul id="driver-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const hqPos = [52.22419, 5.37145];
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; Carto' });
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; Carto' });

        const map = L.map('map', { zoomControl: false }).setView(hqPos, 15);
        darkLayer.addTo(map);

        // Kleiner HQ icoon
        L.marker(hqPos, {
            icon: L.divIcon({
                className: 'hq-marker',
                html: '<div style="font-size: 22px; filter: drop-shadow(0 0 3px gold);">🏠</div>',
                iconSize: [30, 30], iconAnchor: [15, 15]
            })
        }).addTo(map).bindTooltip("HQ", { permanent: true, direction: 'bottom', className: 'hq-label', offset: [0, 5] });

        let isDark = true;
        function toggleMap() {
            if (isDark) { map.removeLayer(darkLayer); lightLayer.addTo(map); isDark = false; }
            else { map.removeLayer(lightLayer); darkLayer.addTo(map); isDark = true; }
        }

        const carIcon = L.divIcon({ className: 'car-marker', html: '<div style="font-size: 24px; filter: drop-shadow(0 0 2px black);">🚗</div>', iconSize: [30, 30], iconAnchor: [15, 15] });
        const ably = new Ably.Realtime({ key: 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ' });
        const channel = ably.channels.get('tracking');

        let markers = {};
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        channel.subscribe('pos', (message) => {
            const { name, lat, lng } = message.data;
            const dist = calculateDistance(lat, lng, hqPos[0], hqPos[1]);
            const mins = Math.max(1, Math.round(dist * 2.5));

            if (!markers[name]) {
                const li = document.createElement('li');
                li.id = "li-" + name; li.className = "driver-item";
                li.innerHTML = `<div class="driver-info">🚗 ${name}</div><div id="eta-${name}" class="driver-eta">${dist.toFixed(1)} km<br>${mins} min</div>`;
                document.getElementById('driver-list').appendChild(li);
                markers[name] = L.marker([lat, lng], { icon: carIcon }).addTo(map).bindTooltip(name, { permanent: true, direction: 'top', className: 'driver-label', offset: [0, -10] }).openTooltip();
            } else {
                markers[name].setLatLng([lat, lng]);
                document.getElementById(`eta-${name}`).innerHTML = `${dist.toFixed(1)} km<br>${mins} min`;
            }
        });
    </script>
</body>
</html>
