<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlingBling Navigatie | Driver Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        /* Design Systeem */
        :root { 
            --gold: #ffcc00; 
            --dark: #121212; 
            --light: #ffffff; 
            --red: #ff4444;
            --blue: #4285F4;
            --gray: #f8f9fa;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }

        /* Kaart Sectie */
        #map { 
            height: 55%; 
            width: 100%; 
            z-index: 1; 
            filter: grayscale(0.2) contrast(1.1);
        }
        
        /* Gebruikersinterface (Onderste Paneel) */
        .ui-panel { 
            height: 45%; 
            background: var(--light); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-top: 5px solid var(--gold); 
            position: relative; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -15px 40px rgba(0,0,0,0.3); 
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Status Dashboard */
        .stats-grid { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            background: var(--gray); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #eee;
            animation: fadeIn 0.5s ease;
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: 900; font-size: 1.4rem; color: var(--dark); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: #888; letter-spacing: 1px; }

        /* Input Velden */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        
        input { 
            background: var(--gray); 
            border: 2px solid #eee; 
            padding: 18px; 
            border-radius: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 1rem; 
            font-weight: 600;
            outline: none; 
            transition: 0.3s;
        }
        
        input:focus { border-color: var(--gold); background: #fff; box-shadow: 0 0 0 4px rgba(255,204,0,0.1); }

        /* Knoppen */
        .btn { 
            padding: 20px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 900; 
            font-size: 1.2rem; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.3s active;
        }

        .btn-start { 
            background: var(--gold); 
            color: var(--dark);
            box-shadow: 0 8px 25px rgba(255,204,0,0.4); 
        }
        
        .btn-start:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,204,0,0.2); }

        .btn-stop { 
            background: var(--red); 
            color: white; 
            margin-top: auto;
            box-shadow: 0 8px 25px rgba(255,68,68,0.3);
        }

        /* Custom Icons */
        .finish-marker { 
            background: var(--red); 
            border: 3px solid white; 
            border-radius: 50% 50% 50% 0; 
            transform: rotate(-45deg); 
            width: 40px !important; height: 40px !important; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .finish-marker span { transform: rotate(45deg); font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Location Dot Animation */
        .user-dot {
            width: 20px; height: 20px;
            background: var(--blue);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-panel" id="ui">
        <div class="stats-grid" id="stats">
            <div class="stat-item">
                <span class="stat-val" id="val-speed">0</span>
                <span class="stat-label">km/u</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="val-dist">0.0</span>
                <span class="stat-label">Afstand</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="val-eta">0</span>
                <span class="stat-label">Minuten</span>
            </div>
        </div>

        <div class="input-group" id="setup">
            <input type="text" id="driverName" placeholder="Jouw Naam (Bezorger)">
            <input type="text" id="targetAddress" placeholder="Adres (bijv. Kerkstraat 10 Nijkerk)">
        </div>

        <button id="actionBtn" class="btn btn-start" onclick="initRit()">Start Rit</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialisatie
        const ably = new Ably.Realtime('IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ');
        const channel = ably.channels.get('tracking');
        
        let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.2241, 5.3714], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let userMarker = L.marker([0,0], { 
            icon: L.divIcon({ className: 'user-dot', iconSize: [20, 20], iconAnchor: [10, 10] }) 
        }).addTo(map);

        let routeLine = L.polyline([], { color: '#4285F4', weight: 8, opacity: 0.8, lineCap: 'round' }).addTo(map);
        let destinationMarker = null;
        let detectedCity = ""; // Hier wordt de plaatsnaam opgeslagen
        let isStarted = false;
        let watchId = null;

        // 2. Rit Starten
        async function initRit() {
            const name = document.getElementById('driverName').value;
            const address = document.getElementById('targetAddress').value;

            if(!name || !address) {
                alert("Vergeet je naam en het adres niet!");
                return;
            }

            isStarted = true;
            document.getElementById('setup').style.display = "none";
            document.getElementById('stats').style.display = "grid";
            
            const btn = document.getElementById('actionBtn');
            btn.innerText = "Rit Beëindigen";
            btn.className = "btn btn-stop";
            btn.onclick = () => location.reload();

            // Start GPS Tracking
            startTracking(name, address);
        }

        // 3. Geavanceerde Tracking & Route
        function startTracking(name, address) {
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude, speed } = pos.coords;
                const currentPos = [latitude, longitude];

                // Update Marker & Kaart
                userMarker.setLatLng(currentPos);
                map.panTo(currentPos, { animate: true, duration: 1 });

                // Update Speed UI
                document.getElementById('val-speed').innerText = speed ? Math.round(speed * 3.6) : 0;

                // Haal route op als dit de eerste keer is
                if (routeLine.getLatLngs().length === 0) {
                    await fetchRoute(latitude, longitude, address);
                }

                // Zend data naar Dashboard
                channel.publish('pos', { 
                    name: name, 
                    lat: latitude, 
                    lng: longitude, 
                    destination: address,
                    city: detectedCity // De gedetecteerde plaatsnaam meesturen
                });

                // Update Afstand & ETA
                updateRitStats(latitude, longitude);

            }, (err) => {
                console.error("GPS Fout:", err);
            }, { 
                enableHighAccuracy: true,
                maximumAge: 1000 
            });
        }

        // 4. Route & Plaatsnaam ophalen (Reverse Geocoding)
        async function fetchRoute(slat, slng, destAddr) {
            try {
                // Stap A: Adres omzetten naar coördinaten + Plaatsnaam ophalen
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(destAddr)}`);
                const geoData = await geoRes.json();

                if (geoData.length > 0) {
                    const target = geoData[0];
                    const elat = target.lat;
                    const elng = target.lon;

                    // De stad/dorp/gemeente uit de data halen
                    detectedCity = target.address.city || target.address.town || target.address.village || target.address.suburb || "";

                    // Marker op eindbestemming
                    if (destinationMarker) map.removeLayer(destinationMarker);
                    destinationMarker = L.marker([elat, elng], { 
                        icon: L.divIcon({ className: 'finish-marker', html: '<span>🏁</span>' }) 
                    }).addTo(map);

                    // Stap B: Route berekenen via OSRM
                    const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${slng},${slat};${elng},${elat}?overview=full&geometries=geojson`);
                    const routeData = await routeRes.json();

                    if (routeData.routes && routeData.routes[0]) {
                        const coords = routeData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                        routeLine.setLatLngs(coords);
                    }
                }
            } catch (error) {
                console.error("Fout bij ophalen route:", error);
            }
        }

        // 5. Statistieken updaten
        function updateRitStats(lat, lng) {
            const points = routeLine.getLatLngs();
            if (points.length > 0) {
                const target = points[points.length - 1];
                const distanceInMeters = map.distance([lat, lng], target);
                const distanceInKm = distanceInMeters / 1000;

                document.getElementById('val-dist').innerText = distanceInKm.toFixed(1) + " km";
                
                // ETA: Gemiddeld 2.5 min per km in de stad
                const etaMinutes = Math.ceil(distanceInKm * 2.5) + 1;
                document.getElementById('val-eta').innerText = etaMinutes;
            }
        }

        // Fix voor kaart-grootte bij laden
        window.onload = () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
        };
    </script>
</body>
</html>
