<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling Navigatie</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 60%; width: 100%; }
        .ui { height: 40%; background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 2px solid #ffcc00; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 1000; position: relative; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; }
        .live-tag { color: #00ff00; font-weight: bold; font-size: 0.8rem; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .btn { padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .nav-btn { background: #ffcc00; color: black; }
        .stop-btn { background: #ff4444; color: white; }
        #instruction { font-size: 0.9rem; color: #aaa; text-align: center; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="ui">
        <div class="status-bar">
            <div id="status" class="live-tag" style="visibility: hidden;">● LIVE VERBINDING</div>
            <div id="timer" style="font-weight: bold;">00:00</div>
        </div>

        <input type="text" id="driverName" placeholder="Naam bezorger...">
        <input type="text" id="targetAddress" placeholder="Adres van de klant...">
        
        <button id="mainBtn" class="btn nav-btn" onclick="startJourney()">START RIT & NAVIGEER</button>
        <div id="instruction">Hou dit scherm open tijdens het rijden</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const ably = new Ably.Realtime('IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ');
        const channel = ably.channels.get('tracking');
        
        let map = L.map('map', { zoomControl: false }).setView([52.2241, 5.3714], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let carIcon = L.divIcon({ html: '🚗', className: 'car-icon', iconSize: [25, 25] });
        let marker = L.marker([0,0], {icon: carIcon}).addTo(map);
        let routeLine = L.polyline([], {color: '#4285F4', weight: 5, opacity: 0.8}).addTo(map);
        
        let watchId = null;
        let isActive = false;

        document.getElementById('driverName').value = localStorage.getItem('driverName') || "";

        async function startJourney() {
            const name = document.getElementById('driverName').value;
            const address = document.getElementById('targetAddress').value;
            
            if(!name) return alert("Vul je naam in!");
            localStorage.setItem('driverName', name);

            isActive = true;
            document.getElementById('mainBtn').innerText = "STOP RIT";
            document.getElementById('mainBtn').className = "btn stop-btn";
            document.getElementById('mainBtn').onclick = () => location.reload();
            document.getElementById('status').style.visibility = "visible";

            // Start GPS en Tracking
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // 1. Dashboard updaten via Ably
                channel.publish('pos', { name: name, lat: lat, lng: lng });
                
                // 2. Lokale kaart updaten
                marker.setLatLng([lat, lng]);
                map.setView([lat, lng], 16);

                // 3. Route tekenen als er een adres is
                if(address && routeLine.getLatLngs().length === 0) {
                    drawRoute(lat, lng, address);
                }
            }, null, { enableHighAccuracy: true });
        }

        async function drawRoute(startLat, startLng, destination) {
            try {
                // Geocoding: Adres naar coördinaten
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destination)}`);
                const geoData = await geoRes.json();
                if(geoData.length === 0) return;
                
                const endLat = geoData[0].lat;
                const endLng = geoData[0].lon;

                // Route berekenen
                const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson`);
                const routeData = await routeRes.json();
                
                const coordinates = routeData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                routeLine.setLatLngs(coordinates);
                L.marker([endLat, endLng]).addTo(map).bindPopup("Klant").openPopup();
            } catch (e) { console.error("Route fout:", e); }
        }
    </script>
</body>
</html>
