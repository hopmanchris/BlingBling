<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling Zender Nav</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 50%; width: 100%; border-bottom: 2px solid #ffcc00; }
        .controls { height: 50%; padding: 15px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; background: #1a2a3a; }
        
        .status-header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; }
        .timer { font-weight: bold; color: #ffcc00; font-size: 1.2rem; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; background: #111; color: white; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .start-btn { background: #ffcc00; color: #000; }
        .stop-btn { background: #ff4444; color: #fff; margin-top: 10px; }
        
        .pulse { animation: p 2s infinite; color: #00ff00; font-size: 0.8rem; font-weight: bold; }
        @keyframes p { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="controls">
        <div class="status-header">
            <div id="status" class="">OFFLINE</div>
            <div class="timer" id="timer">00:00</div>
        </div>

        <input type="text" id="driverName" placeholder="Naam bezorger...">
        <input type="text" id="targetAddress" placeholder="Adres van de klant...">
        
        <button id="toggleBtn" class="btn start-btn" onclick="toggleTracking()">START RIT & NAVIGATIE</button>
        <button id="stopBtn" class="btn stop-btn" style="display:none;" onclick="location.reload()">STOP RIT</button>
        
        <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">Hou dit scherm open tijdens het rijden.</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const ably = new Ably.Realtime('IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ');
        const channel = ably.channels.get('tracking');
        
        let map = L.map('map', { zoomControl: false }).setView([52.22419, 5.37145], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.marker([0,0]).addTo(map);
        let watchId = null;
        let startTime = Date.now();

        // Onthoud naam
        document.getElementById('driverName').value = localStorage.getItem('driverName') || "";

        function toggleTracking() {
            const name = document.getElementById('driverName').value;
            const target = document.getElementById('targetAddress').value;
            if(!name) return alert("Naam invullen");

            localStorage.setItem('driverName', name);
            
            // Start GPS
            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // Update lokale kaart
                const latlng = [lat, lng];
                marker.setLatLng(latlng);
                map.panTo(latlng);

                // Verzend naar dashboard
                channel.publish('pos', { name: name, lat: lat, lng: lng });
                
                document.getElementById('status').innerText = "• LIVE VERBINDING";
                document.getElementById('status').className = "pulse";
            }, null, { enableHighAccuracy: true });

            // UI aanpassen
            document.getElementById('toggleBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            
            // Timer starten
            setInterval(() => {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = Math.floor(diff/60).toString().padStart(2,'0') + ":" + (diff%60).toString().padStart(2,'0');
            }, 1000);

            // Als er een adres is ingevuld, open een klein venster voor de route
            if(target) {
                const searchUrl = `https://www.google.com/maps/embed/v1/directions?key=JOUW_GOOGLE_MAPS_API_KEY&origin=current_location&destination=${encodeURIComponent(target)}`;
                // Let op: Voor echte navigatie-instructies in de app is een API-key nodig.
                // Als alternatief openen we een link die in een kleine popup blijft.
            }
        }
    </script>
</body>
</html>
