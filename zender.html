<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling Zender ULTIMATE</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; }
        .status-circle { width: 120px; height: 120px; border-radius: 50%; background: #111; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .active-glow { animation: pulse 2s infinite; border-color: #00ff00 !important; box-shadow: 0 0 30px rgba(0,255,0,0.5); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        input { padding: 15px; width: 90%; max-width: 300px; border-radius: 12px; border: 2px solid #333; margin-bottom: 15px; background: #111; color: white; text-align: center; }
        .main-btn { padding: 18px; font-size: 1.2rem; font-weight: bold; background: #ffcc00; border: none; border-radius: 50px; width: 90%; max-width: 300px; color: black; }
        .stop-btn { background: #ff4444 !important; color: white !important; }
        .nav-box { margin-top: 30px; padding: 20px; background: #1a2a3a; width: 90%; max-width: 300px; border-radius: 15px; border: 1px solid #334455; }
        .nav-btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;"><img src="logo.png" style="max-height: 50px;"></div>

    <div class="status-circle" id="circle">
        <span id="status-text" style="font-size: 0.7rem; letter-spacing: 2px;">OFFLINE</span>
        <div id="timer" style="font-size: 1.1rem; font-weight: bold;">00:00</div>
    </div>

    <input type="text" id="driverName" placeholder="Naam bezorger...">
    <button id="toggleBtn" class="main-btn" onclick="toggleTracking()">START RIT</button>

    <div class="nav-box" id="navBox" style="display: none;">
        <input type="text" id="targetAddress" placeholder="Adres klant..." style="width: 100%;">
        <button class="nav-btn" style="background: #4285F4;" onclick="openNav('google')">Open Google Maps</button>
    </div>

    <audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

    <script>
        const ably = new Ably.Realtime('IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ');
        const channel = ably.channels.get('tracking');
        let watchId = null;
        let lastSend = 0;

        function openNav(type) {
            const addr = encodeURIComponent(document.getElementById('targetAddress').value);
            if (!addr) return alert("Vul adres in");
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${addr}`, '_blank');
        }

        async function toggleTracking() {
            const audio = document.getElementById('silentAudio');
            const btn = document.getElementById('toggleBtn');
            
            if (watchId === null) {
                // 1. Speel stilte af om de CPU wakker te houden
                audio.play().catch(e => console.log("Audio start pas na interactie"));
                
                // 2. Start GPS
                watchId = navigator.geolocation.watchPosition(pos => {
                    const now = Date.now();
                    if (now - lastSend > 5000) {
                        channel.publish('pos', {
                            name: document.getElementById('driverName').value,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude
                        });
                        lastSend = now;
                    }
                    document.getElementById('circle').classList.add('active-glow');
                    document.getElementById('status-text').innerText = "LIVE (BG ACTIVE)";
                }, null, { enableHighAccuracy: true });

                btn.innerText = "STOP RIT";
                btn.classList.add('stop-btn');
                document.getElementById('navBox').style.display = "block";
            } else {
                location.reload();
            }
        }
    </script>
</body>
</html>
