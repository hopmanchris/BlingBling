<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlingBling Zender</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #000; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; text-align: center;
        }
        .logo-container { margin-bottom: 20px; }
        .logo-container img { max-height: 50px; }
        .status-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: #222; border: 4px solid #333;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; transition: 0.5s;
        }
        .active-glow { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; background: rgba(0,255,0,0.1); }
        input { 
            padding: 15px; width: 70%; border-radius: 10px; border: none; 
            margin-bottom: 20px; font-size: 1rem; text-align: center;
        }
        button { 
            padding: 20px 40px; font-size: 1.2rem; font-weight: bold;
            background: #ffcc00; border: none; border-radius: 50px; cursor: pointer;
        }
        .stop-btn { background: #ff4444; color: white; }
        #debug { font-size: 0.8rem; margin-top: 20px; opacity: 0.6; color: #00ff00; }
    </style>
</head>
<body>
    <div class="logo-container"><img src="logo.png"></div>
    <div class="status-circle" id="circle"><b>STATUS</b></div>
    <input type="text" id="driverName" placeholder="Naam bezorger...">
    <button id="toggleBtn" onclick="toggleTracking()">START RIT</button>
    <div id="debug">Wachten op actie...</div>

    <script>
        const ably = new Ably.Realtime('IZkpmw.mB2_5w:PAn16Xo-N-E-P2P3pXitR8Cizp2C76IqD5A_p8_qF2w');
        const channel = ably.channels.get('tracking');
        let watchId = null;

        function toggleTracking() {
            const btn = document.getElementById('toggleBtn');
            const name = document.getElementById('driverName').value;
            const debug = document.getElementById('debug');
            const circle = document.getElementById('circle');

            if (!name) { alert("Vul eerst je naam in!"); return; }

            if (watchId === null) {
                // START
                watchId = navigator.geolocation.watchPosition(pos => {
                    const payload = {
                        name: name,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        timestamp: new Date().getTime()
                    };
                    channel.publish('pos', payload);
                    debug.innerText = "Locatie verzonden: " + new Date().toLocaleTimeString();
                }, err => {
                    debug.innerText = "Error: " + err.message;
                    alert("Zet je GPS aan en geef toestemming!");
                }, { enableHighAccuracy: true });

                btn.innerText = "STOP RIT";
                btn.classList.add('stop-btn');
                circle.classList.add('active-glow');
                document.getElementById('driverName').disabled = true;
            } else {
                // STOP
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.innerText = "START RIT";
                btn.classList.remove('stop-btn');
                circle.classList.remove('active-glow');
                document.getElementById('driverName').disabled = false;
                debug.innerText = "Gepauzeerd";
            }
        }
    </script>
</body>
</html>
</html>
