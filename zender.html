<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlingBling Navigatie | Driver Pro Ultra Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        /* DESIGN SYSTEEM 
        */
        :root { 
            --gold: #ffcc00; 
            --gold-dark: #e6b800;
            --dark: #121212; 
            --light: #ffffff; 
            --red: #ff4444;
            --blue: #4285F4;
            --history-path: #2d3748; /* Kleur voor het gereden pad */
            --gray-bg: #f8f9fa;
            --gray-border: #eeeeee;
            --text-main: #1a1a1a;
            --radius-xl: 35px;
            --radius-md: 18px;
            --shadow-premium: 0 20px 50px rgba(0,0,0,0.35);
        }
        
        /* Basis Reset */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
        }
        
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; position: fixed;
        }

        /* MAP SECTIE 
        */
        #map { 
            height: 55%; 
            width: 100%; 
            z-index: 1; 
            filter: contrast(1.05) brightness(0.95);
        }
        
        /* UI PANEEL 
        */
        .ui-panel { 
            height: 45%; 
            background: var(--light); 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
            border-top: 6px solid var(--gold); 
            position: relative; 
            border-radius: var(--radius-xl) var(--radius-xl) 0 0; 
            box-shadow: var(--shadow-premium); 
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* SEARCH & SUGGESTIONS 
        */
        .search-container { 
            position: relative; 
            width: 100%; 
        }

        #suggestions {
            position: absolute; 
            bottom: 110%; 
            left: 0; right: 0;
            background: white; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--gray-border);
            max-height: 250px; 
            overflow-y: auto;
            display: none; 
            z-index: 2000; 
            box-shadow: 0 -15px 35px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .suggestion-item {
            padding: 18px; 
            border-bottom: 1px solid var(--gray-bg);
            font-size: 1rem; 
            cursor: pointer; 
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }
        
        .suggestion-item:before { content: '📍'; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background: #fff9e6; }

        /* DASHBOARD STATS 
        */
        .stats-grid { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            background: var(--gray-bg); 
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid var(--gray-border);
            animation: fadeIn 0.8s ease;
        }

        .stat-item { text-align: center; }
        .stat-val { 
            display: block; 
            font-weight: 900; 
            font-size: 1.7rem; 
            color: var(--dark); 
        }
        .stat-label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            font-weight: 800; 
            color: #aaa; 
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* FORMS & BUTTONS 
        */
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        
        input { 
            background: var(--gray-bg); 
            border: 2px solid var(--gray-border); 
            padding: 20px; 
            border-radius: var(--radius-md); 
            width: 100%; 
            font-size: 1.1rem; 
            font-weight: 600;
            outline: none; 
            transition: 0.3s;
        }
        
        input:focus { 
            border-color: var(--gold); 
            background: #fff; 
            box-shadow: 0 0 0 5px rgba(255,204,0,0.15); 
        }

        .btn { 
            padding: 22px; 
            border-radius: 60px; 
            border: none; 
            font-weight: 900; 
            font-size: 1.3rem; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-start { 
            background: var(--gold); 
            color: var(--dark);
            box-shadow: 0 12px 30px rgba(255,204,0,0.4); 
        }
        
        .btn-start:active { transform: scale(0.95); }

        .btn-stop { 
            background: var(--red); 
            color: white; 
            margin-top: auto;
            box-shadow: 0 10px 25px rgba(255,68,68,0.3);
        }

        /* MARKERS 
        */
        .user-dot {
            width: 26px; height: 26px;
            background: var(--blue);
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(66, 133, 244, 0.7);
        }

        .finish-marker { 
            background: var(--red); 
            border: 3px solid white; 
            border-radius: 50% 50% 50% 0; 
            transform: rotate(-45deg); 
            width: 45px !important; height: 45px !important; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .finish-marker span { transform: rotate(45deg); font-size: 24px; }

        /* Error Toast */
        #error-msg {
            position: fixed; top: 25px; left: 25px; right: 25px;
            background: var(--red); color: white; padding: 20px;
            border-radius: 15px; font-weight: 800; text-align: center;
            z-index: 4000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="error-msg"></div>
    <div id="map"></div>

    <div class="ui-panel" id="ui">
        <div class="stats-grid" id="stats">
            <div class="stat-item">
                <span class="stat-val" id="val-speed">0</span>
                <span class="stat-label">km/u</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="val-dist">0.0</span>
                <span class="stat-label">Afstand</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="val-eta">0</span>
                <span class="stat-label">Min</span>
            </div>
        </div>

        <div class="input-group" id="setup">
            <input type="text" id="driverName" placeholder="Naam Bezorger" maxlength="25">
            <div class="search-container">
                <div id="suggestions"></div>
                <input type="text" id="targetAddress" placeholder="Voer adres in..." autocomplete="off">
            </div>
        </div>

        <button id="actionBtn" class="btn btn-start" onclick="startSystem()">Systeem Starten</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /**
         * 1. INITIALISATIE & VARIABELEN
         */
        const ABLY_KEY = 'IZkpmw.1yPWMw:Aub_kDoBGOXLZejBCeTu8zxHI_s80SzZEUpqll66YCQ';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('tracking');
        
        // Kaart setup
        let map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([52.2241, 5.3714], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // Lagen voor lijnen
        let routeLine = L.polyline([], { 
            color: '#4285F4', weight: 8, opacity: 0.4, lineCap: 'round' 
        }).addTo(map);
        
        let historyLine = L.polyline([], { 
            color: '#1a202c', weight: 9, opacity: 0.9, lineCap: 'round', dashArray: '1, 15' 
        }).addTo(map);

        let userMarker = L.marker([0,0], { 
            icon: L.divIcon({ className: 'user-dot', iconSize: [26, 26], iconAnchor: [13, 13] }) 
        }).addTo(map);

        let destMarker = null;
        let breadcrumbs = []; // Geschiedenis opslag
        let cityFound = "";
        let debounce = null;
        let watchId = null;

        /**
         * 2. ADRES SUGGESTIE ENGINE (NOMINATIM)
         */
        const inputAddr = document.getElementById('targetAddress');
        const listSugg = document.getElementById('suggestions');

        inputAddr.addEventListener('input', () => {
            clearTimeout(debounce);
            const val = inputAddr.value.trim();
            if (val.length < 3) { listSugg.style.display = 'none'; return; }

            debounce = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(val)}&countrycodes=nl&limit=6`)
                .then(r => r.json())
                .then(data => {
                    listSugg.innerHTML = '';
                    if (data && data.length > 0) {
                        listSugg.style.display = 'block';
                        data.forEach(p => {
                            const item = document.createElement('div');
                            item.className = 'suggestion-item';
                            
                            const s = p.address.road || "";
                            const h = p.address.house_number || "";
                            const c = p.address.city || p.address.town || p.address.village || "";
                            const label = `${s} ${h}, ${c}`.replace(/^ ,/, "").trim();
                            
                            item.innerText = label.length > 5 ? label : p.display_name;
                            item.onclick = () => {
                                inputAddr.value = item.innerText;
                                cityFound = c;
                                listSugg.style.display = 'none';
                            };
                            listSugg.appendChild(item);
                        });
                    }
                }).catch(e => console.error("Search error", e));
            }, 450);
        });

        // Klik buiten suggesties verbergen
        document.addEventListener('click', (e) => { if (e.target !== inputAddr) listSugg.style.display = 'none'; });

        /**
         * 3. RIT LOGICA & TRACKING
         */
        async function startSystem() {
            const name = document.getElementById('driverName').value.trim();
            const addr = inputAddr.value.trim();

            if (!name || !addr) {
                const toast = document.getElementById('error-msg');
                toast.innerText = "Voer a.u.b. alle gegevens in!";
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 3000);
                return;
            }

            // Interface Wisselen
            document.getElementById('setup').style.display = "none";
            document.getElementById('stats').style.display = "grid";
            
            const mainBtn = document.getElementById('actionBtn');
            mainBtn.innerText = "Rit Beëindigen";
            mainBtn.className = "btn btn-stop";
            mainBtn.onclick = () => location.reload();

            // Start GPS Watch
            initTracking(name, addr);
        }

        function initTracking(name, addr) {
            if (!navigator.geolocation) return alert("Geen GPS beschikbaar");

            watchId = navigator.geolocation.watchPosition(async (p) => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                const speed = p.coords.speed;
                const pos = [lat, lng];

                // A. Update Marker & Camera
                userMarker.setLatLng(pos);
                map.panTo(pos, { animate: true, duration: 1.5 });

                // B. Geschiedenis (Breadcrumbs)
                breadcrumbs.push(pos);
                historyLine.setLatLngs(breadcrumbs);

                // C. Snelheid UI
                document.getElementById('val-speed').innerText = speed ? Math.round(speed * 3.6) : 0;

                // D. Eerste keer Route laden
                if (routeLine.getLatLngs().length === 0) {
                    await getRoute(lat, lng, addr);
                }

                // E. Sync met Dashboard
                channel.publish('pos', { 
                    name: name, lat, lng, 
                    destination: addr, 
                    city: cityFound 
                });

                // F. Update Afstand & ETA
                refreshLiveStats(lat, lng);

            }, (err) => console.error("GPS Error", err), 
            { enableHighAccuracy: true, maximumAge: 0 });
        }

        /**
         * 4. ROUTE & STATS BEREKENING
         */
        async function getRoute(slat, slng, address) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(address)}`);
                const data = await res.json();

                if (data && data.length > 0) {
                    const target = data[0];
                    if (!cityFound) cityFound = target.address.city || target.address.town || "";

                    // Zet Finish Vlag
                    if (destMarker) map.removeLayer(destMarker);
                    destMarker = L.marker([target.lat, target.lon], { 
                        icon: L.divIcon({ className: 'finish-marker', html: '<span>🏁</span>' }) 
                    }).addTo(map);

                    // Haal OSRM Route
                    const osrm = await fetch(`https://router.project-osrm.org/route/v1/driving/${slng},${slat};${target.lon},${target.lat}?overview=full&geometries=geojson`);
                    const routeData = await osrm.json();

                    if (routeData.routes && routeData.routes[0]) {
                        const pts = routeData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                        routeLine.setLatLngs(pts);
                        map.fitBounds(routeLine.getBounds(), { padding: [60, 60] });
                    }
                }
            } catch (err) { console.error("Route Fetch Failed", err); }
        }

        function refreshLiveStats(lat, lng) {
            const path = routeLine.getLatLngs();
            if (path.length > 0) {
                const finish = path[path.length - 1];
                const meters = map.distance([lat, lng], finish);
                const km = meters / 1000;

                document.getElementById('val-dist').innerText = km.toFixed(1) + " km";
                
                // ETA berekening (2.5 min/km gemiddeld in stad)
                const eta = Math.ceil(km * 2.5) + 1;
                document.getElementById('val-eta').innerText = eta;
            }
        }

        // Layout fix
        window.onload = () => { setTimeout(() => map.invalidateSize(), 800); };
    </script>
</body>
</html>
